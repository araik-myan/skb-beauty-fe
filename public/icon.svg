<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#3D3229"/>

  <!-- Subtle inner border -->
  <rect x="4" y="4" width="56" height="56" rx="10" fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="0.3"/>

  <!-- Diamond accent behind text -->
  <rect x="20" y="20" width="24" height="24" rx="2" transform="rotate(45 32 32)" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.15"/>

  <!-- SKB text -->
  <text x="32" y="38" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="18" fill="#C9A96E" letter-spacing="1.5">
    SKB
  </text>

  <!-- Thin golden line below -->
  <line x1="20" y1="43" x2="44" y2="43" stroke="#C9A96E" stroke-width="0.5" opacity="0.5"/>
</svg>
